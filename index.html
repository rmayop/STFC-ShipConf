<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>STFC - Diques en la Nube con Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0b111e;
            color: #4fc3f7;
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .contenedor {
            max-width: 900px;
            margin: 0 auto;
            background-color: #152238;
            border: 2px solid #00e5ff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px #00e5ff;
        }
        .estado-conexion {
            font-size: 14px;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            background-color: #0b111e;
            border-left: 5px solid #ffb300;
        }
        select {
            background-color: #0b111e;
            color: #fff;
            border: 1px solid #00e5ff;
            padding: 6px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .grid-diques {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .tarjeta-dique {
            background-color: #0b111e;
            border: 1px solid #00e5ff;
            border-radius: 8px;
            padding: 15px;
            text-align: left;
            position: relative;
        }
        .letra-dique {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            font-weight: bold;
            color: #ffb300;
        }
        .tarjeta-dique h3 {
            margin-top: 0;
            color: #fff;
            border-bottom: 1px solid #152238;
            padding-bottom: 5px;
            width: 80%;
        }
        .info-nave {
            font-size: 13px;
            color: #b0bec5;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>🖖 Hangar de la Flota (Conectado a Supabase)</h1>
        
        <div id="status" class="estado-conexion">📡 Sincronizando con los sensores de la Flota Estelar...</div>

        <div class="grid-diques">
            <div class="tarjeta-dique">
                <div class="letra-dique">A</div>
                <h3>Dique de Nave</h3>
                <label>Asignar Nave:</label>
                <select id="select_A" onchange="guardarEnNube('A')">
                    <option value="">-- Vacío --</option>
                    <option value="enterprise">USS Enterprise</option>
                    <option value="saladin">USS Saladin</option>
                    <option value="vidar">Vi'Dar</option>
                    <option value="franklin">USS Franklin</option>
                </select>
                <div id="info_A" class="info-nave">Cargando...</div>
            </div>

            <div class="tarjeta-dique">
                <div class="letra-dique">B</div>
                <h3>Dique de Nave</h3>
                <label>Asignar Nave:</label>
                <select id="select_B" onchange="guardarEnNube('B')">
                    <option value="">-- Vacío --</option>
                    <option value="enterprise">USS Enterprise</option>
                    <option value="saladin">USS Saladin</option>
                    <option value="vidar">Vi'Dar</option>
                    <option value="franklin">USS Franklin</option>
                </select>
                <div id="info_B" class="info-nave">Cargando...</div>
            </div>

            <div class="tarjeta-dique">
                <div class="letra-dique">C</div>
                <h3>Dique de Nave</h3>
                <label>Asignar Nave:</label>
                <select id="select_C" onchange="guardarEnNube('C')">
                    <option value="">-- Vacío --</option>
                    <option value="enterprise">USS Enterprise</option>
                    <option value="saladin">USS Saladin</option>
                    <option value="vidar">Vi'Dar</option>
                    <option value="franklin">USS Franklin</option>
                </select>
                <div id="info_C" class="info-nave">Cargando...</div>
            </div>

            <div class="tarjeta-dique">
                <div class="letra-dique">D</div>
                <h3>Dique de Nave</h3>
                <label>Asignar Nave:</label>
                <select id="select_D" onchange="guardarEnNube('D')">
                    <option value="">-- Vacío --</option>
                    <option value="enterprise">USS Enterprise</option>
                    <option value="saladin">USS Saladin</option>
                    <option value="vidar">Vi'Dar</option>
                    <option value="franklin">USS Franklin</option>
                </select>
                <div id="info_D" class="info-nave">Cargando...</div>
            </div>
        </div>
    </div>

    <script>
        // === CONFIGURACIÓN DE TU BASE DE DATOS ===
        const SUPABASE_URL = https://wwqbdjslgdizegztdcjc.supabase.co; 
        const SUPABASE_KEY = sb_publishable_Q4MUzur_4BmyFosBuhiYcQ_PFKVu_xT; 

        // Inicializamos el cliente de Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Como aún no tenemos sistema de login, inventamos un ID fijo para ti
        const MI_USUARIO_ID = "comandante_principal";

        // 1. FUNCIÓN PARA LEER LOS DATOS DESDE SUPABASE AL ABRIR LA WEB
        async function cargarDatosDesdeNube() {
            try {
                // Le pedimos a Supabase las filas de la tabla 'diques' de nuestro usuario
                let { data, error } = await supabase
                    .from('diques')
                    .select('*')
                    .eq('usuario_id', MI_USUARIO_ID);

                if (error) throw error;

                // Si hay datos guardados, los ponemos en los desplegables
                if (data && data.length > 0) {
                    data.forEach(dique => {
                        const selector = document.getElementById(`select_${dique.letra_dique}`);
                        const info = document.getElementById(`info_${dique.letra_dique}`);
                        if (selector) {
                            selector.value = dique.id_nave;
                            info.innerHTML = dique.id_nave ? "<span style='color:#4caf50;'>✔ Sincronizado en la nube</span>" : "Dique libre";
                        }
                    });
                } else {
                    // Si la BBDD está vacía, limpiamos los textos de carga
                    ['A', 'B', 'C', 'D'].forEach(l => document.getElementById(`info_${l}`).innerText = "Dique libre");
                }

                document.getElementById('status').innerHTML = "🟢 Subespacio Estable - Datos sincronizados con Supabase.";
                document.getElementById('status').style.borderLeftColor = "#4caf50";

            } catch (error) {
                console.error("Error cargando datos:", error);
                document.getElementById('status').innerHTML = "🔴 Error de comunicación con los sensores de Supabase.";
                document.getElementById('status').style.borderLeftColor = "#f44336";
            }
        }

        // 2. FUNCIÓN PARA GUARDAR O ACTUALIZAR UNA NAVE CUANDO SE CAMBIA EL DESPLEGABLE
        async function guardarEnNube(letra) {
            const naveSeleccionada = document.getElementById(`select_${letra}`).value;
            const infoDiv = document.getElementById(`info_${letra}`);
            
            infoDiv.innerText = "Guardando...";

            try {
                // Comando 'upsert': Si el registro existe (mismo usuario y dique), lo actualiza. Si no, lo crea.
                const { error } = await supabase
                    .from('diques')
                    .upsert({ 
                        usuario_id: MI_USUARIO_ID, 
                        letra_dique: letra, 
                        id_nave: naveSeleccionada 
                    }, { onConflict: 'usuario_id, letra_dique' }); // Evita duplicar filas para el mismo dique

                if (error) throw error;

                infoDiv.innerHTML = naveSeleccionada ? "<span style='color:#4caf50;'>✔ Guardado en la nube</span>" : "Dique libre";

            } catch (error) {
                console.error("Error guardando datos:", error);
                infoDiv.innerHTML = "<span style='color:#f44336;'>❌ Error al guardar</span>";
            }
        }

        // Ejecutar la carga automática al abrir la web
        cargarDatosDesdeNube();
    </script>
</body>
</html>
