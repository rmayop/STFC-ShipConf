<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>STFC - Acceso al Astillero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0b111e;
            color: #4fc3f7;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .auth-box {
            max-width: 380px;
            width: 100%;
            background-color: #152238;
            border: 2px solid #00e5ff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px #00e5ff;
            box-sizing: border-box;
        }
        h1 { color: #fff; text-align: center; margin-top: 0; font-size: 24px; }
        h2 { color: #ffb300; text-align: center; font-size: 18px; margin-bottom: 25px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background-color: #0b111e;
            border: 1px solid #00e5ff;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #00e5ff;
            color: #0b111e;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .btn:hover { background-color: #fff; }
        .btn-enlace {
            background-color: transparent;
            color: #ffb300;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            display: block;
            margin: 0 auto;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="auth-box">
        <h1>🖖 Astillero STFC</h1>
        <h2 id="authTitulo">Iniciar Sesión</h2>
        
        <label>Correo Electrónico:</label>
        <input type="email" id="authEmail" placeholder="tu-email@federacion.com">
        
        <label>Contraseña:</label>
        <input type="password" id="authPassword" placeholder="Mínimo 6 caracteres">
        
        <button id="btnPrincipal" class="btn" onclick="manejarAuth()">Entrar al Hangar</button>
        <button id="btnCambiarModo" class="btn-enlace" onclick="cambiarModoAuth()">¿No tienes cuenta? Regístrate aquí</button>
    </div>

    <script>
        // Configuración directa con tus datos de Supabase reales
        const SUPABASE_URL = "https://wwqbdjslgdizegztdcjc.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3cWJkanNsZ2RpemVnenRkY2pjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDIwNTcsImV4cCI6MjA5Nzc3ODA1N30.c79yLH1azR5LNmdtIaSLNJrD61b9FVP6jcpvUa1NVhc"; 

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let modoRegistro = false;

        function cambiarModoAuth() {
            modoRegistro = !modoRegistro;
            document.getElementById('authTitulo').innerText = modoRegistro ? "Crear Nueva Cuenta" : "Iniciar Sesión";
            document.getElementById('btnPrincipal').innerText = modoRegistro ? "Registrarse" : "Entrar al Hangar";
            document.getElementById('btnCambiarModo').innerText = modoRegistro ? "¿Ya tienes cuenta? Inicia Sesión" : "¿No tienes cuenta? Regístrate aquí";
        }

        async function manejarAuth() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;

            if (!email || !password) return alert("Por favor, rellena todos los campos.");

            try {
                if (modoRegistro) {
                    let { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    alert("¡Registro enviado! Ya puedes iniciar sesión (si desactivaste la confirmación de email en Supabase).");
                    cambiarModoAuth();
                } else {
                    let { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    window.location.href = "hangar.html"; 
                }
            } catch (error) {
                alert("Error de la Flota: " + error.message);
