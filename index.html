<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>STFC - Acceso al Astillero</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            background-color: #0b111e;
            color: #4fc3f7;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* Centra todo verticalmente en la pantalla */
        }
        .auth-box {
            max-width: 380px;
            width: 100%;
            background-color: #152238;
            border: 2px solid #00e5ff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px #00e5ff;
            box-sizing: border-box;
        }
        h1 {
            color: #fff;
            text-align: center;
            margin-top: 0;
            font-size: 24px;
        }
        h2 {
            color: #ffb300;
            text-align: center;
            font-size: 18px;
            margin-bottom: 25px;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            background-color: #0b111e;
            border: 1px solid #00e5ff;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #00e5ff;
            color: #0b111e;
            border: none;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            margin-bottom: 15px;
        }
        .btn:hover {
            background-color: #fff;
        }
        .btn-enlace {
            background-color: transparent;
            color: #ffb300;
            border: none;
            cursor: pointer;
            text-decoration: underline;
            display: block;
            margin: 0 auto;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="auth-box">
        <h1>🖖 Astillero STFC</h1>
        <h2 id="authTitulo">Iniciar Sesión</h2>
        
        <label>Correo Electrónico:</label>
        <input type="email" id="authEmail" placeholder="tu-email@federacion.com">
        
        <label>Contraseña:</label>
        <input type="password" id="authPassword" placeholder="Mínimo 6 caracteres">
        
        <button id="btnPrincipal" class="btn" onclick="manejarAuth()">Entrar al Hangar</button>
        
        <button id="btnCambiarModo" class="btn-enlace" onclick="cambiarModoAuth()">¿No tienes cuenta? Regístrate aquí</button>
    </div>

    <script>
        // === CONFIGURACIÓN DE TU BASE DE DATOS ===
        const SUPABASE_URL = "https://wwqbdjslgdizegztdcjc.supabase.co"; 
        const SUPABASE_KEY = "sb_publishable_Q4MUzur_4BmyFosBuhiYcQ_PFKVu_xT"; 

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let modoRegistro = false; // False = Login, True = Registro

        // Alterna visualmente el diseño del formulario entre Login y Registro
        function cambiarModoAuth() {
            modoRegistro = !modoRegistro;
            document.getElementById('authTitulo').innerText = modoRegistro ? "Crear Nueva Cuenta" : "Iniciar Sesión";
            document.getElementById('btnPrincipal').innerText = modoRegistro ? "Registrarse" : "Entrar al Hangar";
            document.getElementById('btnCambiarModo').innerText = modoRegistro ? "¿Ya tienes cuenta? Inicia Sesión" : "¿No tienes cuenta? Regístrate aquí";
        }

        // Envía los datos a Supabase según el modo seleccionado
        async function manejarAuth() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;

            if (!email || !password) {
                return alert("Por favor, rellena todos los campos.");
            }

            try {
                if (modoRegistro) {
                    // MODO REGISTRO
                    let { data, error } = await supabase.auth.signUp({ email, password });
                    if (error) throw error;
                    
                    alert("¡Registro enviado! Si Supabase te pide confirmar por email, revisa tu correo. Si no, ya puedes iniciar sesión.");
                    cambiarModoAuth(); // Volvemos al modo login automáticamente
                } else {
                    // MODO LOGIN
                    let { data, error } = await supabase.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    
                    // ¡ÉXITO! Si el login es correcto, enviamos al usuario a la página del hangar
                    alert("¡Acceso concedido! Conectando con el hangar...");
                    window.location.href = "hangar.html"; 
                }
            } catch (error) {
                alert("Error de la Flota: " + error.message);
            }
        }

        // Si el usuario ya estaba logueado de antes, lo mandamos directo al hangar
        async function verificarSesionPrevia() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = "hangar.html";
            }
        }
        verificarSesionPrevia();
    </script>
</body>
</html>
